name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Ruff check
        run: uv run ruff check yadi tests

      - name: Ruff format check
        run: uv run ruff format --check yadi tests

      - name: Mypy
        run: uv run mypy yadi

      - name: Pytest
        run: uv run pytest
